#config-version=FGT-7.2.5
config system global
    set hostname "FGT-HQ"
end
config system interface
    edit "port1"
        set vdom "root"
        set ip 203.0.113.10 255.255.255.248
        set allowaccess ping https ssh http
        set role wan
        set status up
    next
    edit "port2"
        set vdom "root"
        set ip 192.168.1.1 255.255.255.0
        set allowaccess ping https
    next
    edit "vlan10"
        set vdom "root"
        set ip 10.0.10.1 255.255.255.0
        set interface "port2"
        set vlanid 10
    next
end
config system zone
    edit "trust"
        set interface "port2" "vlan10"
    next
end
config firewall address
    edit "LAN"
        set subnet 192.168.1.0 255.255.255.0
        set comment "rete interna"
    next
    edit "SRV"
        set subnet 192.168.1.10 255.255.255.255
    next
    edit "UNUSED-ADDR"
        set subnet 10.9.9.0 255.255.255.0
    next
    edit "SITE-FQDN"
        set type fqdn
        set fqdn "example.com"
    next
end
config firewall addrgrp
    edit "GRP1"
        set member "LAN" "SRV"
    next
end
config firewall service custom
    edit "HTTPS"
        set protocol TCP
        set tcp-portrange 443
    next
    edit "UNUSED-SVC"
        set protocol TCP
        set tcp-portrange 9999
    next
end
config firewall vip
    edit "WEB-VIP"
        set extip 203.0.113.20
        set mappedip "192.168.1.10"
        set extintf "port1"
        set extport 443
        set mappedport 443
    next
end
config firewall policy
    edit 1
        set name "LAN-to-WAN"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "all"
        set dstaddr "all"
        set service "HTTPS"
        set action accept
        set nat enable
        set status enable
        set schedule "always"
        set logtraffic all
    next
    edit 2
        set name "disabled-rule"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "LAN"
        set dstaddr "SRV"
        set service "HTTPS"
        set action accept
        set status disable
        set logtraffic disable
    next
end
config router static
    edit 1
        set dst 0.0.0.0 0.0.0.0
        set gateway 203.0.113.9
        set device "port1"
    next
end
config system admin
    edit "admin"
        set accprofile "super_admin"
        set trusthost1 10.0.0.0 255.255.255.0
    next
    edit "noguard"
        set accprofile "super_admin"
    next
end
config vpn ipsec phase1-interface
    edit "vpn-hq"
        set remote-gw 198.51.100.1
        set interface "port1"
        set proposal aes256-sha256
    next
end
config vpn ipsec phase2-interface
    edit "vpn-hq-p2"
        set phase1name "vpn-hq"
    next
end
config log syslogd setting
    set status enable
end
